name: Customer Segmentation Pipeline

# Workflow ini akan berjalan otomatis setiap kali 'git push' ke branch utama (main/master)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest 

    steps:
    # 1. Mengambil seluruh kodingan dari repositori GitHub
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Menyiapkan environment Python
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Menginstal library yang dibutuhkan dengan masuk ke folder MLProject
    - name: Install Dependencies
      run: |
        # cek ada folder apa saja 
        ls -R
        # Sesuaikan cd dengan hasil ls di atas
        cd MLProject
        pip install pandas scikit-learn mlflow numpy joblib

    # 4. Menjalankan script ML untuk memastikan tidak ada error (Testing)
    - name: Run Machine Learning Model
      run: |
        mlflow run MLProject --env-manager=local

    # 5. Build Docker Image 
    - name: Test Docker Build
      run: |
        cd MLProject
        docker build -t test-segmentation-image:latest .

    # 6. Menyimpan Artefak Data Bersih & Model (.joblib) ke dalam GitHub Actions
    - name: Upload Preprocessed Artifacts and Model
      uses: actions/upload-artifact@v4
      with:
        name: customer-segmentation-artifacts
        path: |
          MLProject/shopping_trends_preprocessed.csv
          MLProject/model/kmeans_model.joblib
        retention-days: 7